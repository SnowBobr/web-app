name: Build and Push to DockerHub

on:
  push:
    branches: [ main, master ]
    paths:
      - 'index.html'
      - 'Dockerfile' 

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/my-website:latest
            ${{ secrets.DOCKER_USERNAME }}/my-website:${{ github.sha }}

      - name: Update manifest in ArgoCD repo
        env:
          TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          git clone https://snowbobr:${TOKEN}@github.com/snowbobr/argocd-configs.git
          
          cd ArgoCD/apps/app1/overlays/dev
          sed -i "s|image:.*|image: snowbobr/my-website:${{ github.sha }}|g" deployment.yaml
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image to ${{ github.sha }}"
          
          git push https://snowbobr:${TOKEN}@github.com/snowbobr/argocd-configs.git